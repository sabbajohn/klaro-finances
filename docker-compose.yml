services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET}
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/klaro.sqlite
    volumes:
      - klaro_data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  klaro_data:
